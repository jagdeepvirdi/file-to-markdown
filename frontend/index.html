<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>File → Markdown</title>
<link rel="stylesheet" href="style.v3.css" />
</head>
<body>

  <div class="app">

    <header class="topbar">
      <div class="eyebrow">LOCAL&nbsp;&middot;&nbsp;OFFLINE&nbsp;&middot;&nbsp;NO&nbsp;AI</div>
      <h1>File <span class="arrow">&rarr;</span> Markdown</h1>
    </header>

    <main class="workspace">

      <!-- COLUMN 1: LEFT (File Drop & Selection) -->
      <div class="col col-left">
        <div class="col-header">
          <h2>Input File</h2>
        </div>
        
        <div id="dropZone" class="dropzone" tabindex="0" role="button" aria-label="Choose or drop a file to convert">
          <svg class="dz-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <path d="M14 2v6h6"/>
          </svg>
          <p class="dz-title">Drop a file here</p>
          <p class="dz-sub">or click to browse</p>
        </div>
        <input id="fileInput" type="file" hidden />

        <div id="selectedCard" class="selected-card" hidden>
          <div class="selected-title">Selected File</div>
          <div class="ready-caption">
            <span class="fmt-badge fmt-src" id="readyFilename"></span>
            <span class="ready-arrow">&rarr;</span>
            <span class="fmt-badge fmt-dst">.md</span>
          </div>
        </div>

        <button id="extToggle" class="link-btn" type="button" aria-expanded="false">
          Show supported file types
        </button>
        <div id="extList" class="ext-list" hidden></div>
      </div>

      <!-- COLUMN 2: MIDDLE (Actions & Log History) -->
      <div class="col col-middle">
        <div class="col-header">
          <h2>Action</h2>
        </div>
        
        <div class="action-wrap">
          <button id="convertBtn" class="btn btn-primary btn-convert" type="button" disabled>
            <span id="convertBtnText">Convert</span>
            <div id="convertSpinner" class="spinner" hidden></div>
          </button>
        </div>

        <div id="progressWrap" class="progress-wrap" hidden>
          <div id="progressLabel" class="progress-label">Preparing…</div>
          <div class="progress-bar-track">
            <div id="progressBarFill" class="progress-bar-fill"></div>
          </div>
        </div>

        <div class="log-history">
          <div class="log-header">
            <h3>Log History</h3>
            <button id="clearLogsBtn" class="btn-clear-logs" title="Clear log history" type="button">Clear</button>
          </div>
          <div id="logList" class="log-list">
            <div class="log-empty">No files converted yet.</div>
          </div>
        </div>
      </div>

      <!-- COLUMN 3: RIGHT (Preview & Output) -->
      <div class="col col-right">
        <div class="col-header">
          <h2>Output Preview</h2>
        </div>
        
        <div id="resultContainer" class="result-container">
          <div class="toolbar">
            <div class="filemeta">
              <span class="file-pill" id="resultFilename"></span>
              <span class="char-count" id="resultMeta"></span>
            </div>
            <div class="toolbar-actions">
              <button id="clearBtn" class="btn btn-ghost" type="button">Clear</button>
              <button id="copyBtn" class="btn btn-ghost" type="button">Copy</button>
              <button id="downloadBtn" class="btn btn-primary" type="button">Download .md</button>
            </div>
          </div>

          <div id="previewView" class="output preview-view"></div>
        </div>
      </div>

    </main>

    <div id="toast" class="toast" hidden></div>

  </div>

  <script src="marked.umd.js"></script>
  <script src="app.v4.js"></script>
</body>
</html>
